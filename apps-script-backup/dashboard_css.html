<style>
.main-content{margin-left:240px;padding:28px 36px;min-height:100vh;background:#f5f6fa;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}

/* Header */
.db-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.db-header-left h1{font-size:24px;font-weight:700;color:#1e1b4b;margin:0;letter-spacing:-.02em}
.db-header-left p{font-size:13px;color:#94a3b8;margin:2px 0 0}
.db-año-sel{padding:6px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-weight:600;color:#1e1b4b;background:#fff;cursor:pointer}
.db-año-sel:focus{outline:none;border-color:#4f46e5}

/* KPI row */
.db-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.db-kpi{background:#fff;border-radius:14px;padding:20px 22px;border:1px solid #e8ecf1;display:flex;align-items:center;gap:16px;transition:all .2s;cursor:pointer}
.db-kpi:hover{box-shadow:0 4px 20px rgba(0,0,0,.07);transform:translateY(-2px)}
.db-kpi-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.db-kpi-body{flex:1;min-width:0}
.db-kpi-label{display:block;font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.04em}
.db-kpi-value{display:block;font-size:28px;font-weight:800;color:#1e1b4b;letter-spacing:-.02em;line-height:1.15;margin-top:2px}
.db-kpi-sub{display:block;font-size:11px;margin-top:2px}

.db-kpi-green .db-kpi-icon{background:#d1fae5;color:#059669}
.db-kpi-green .db-kpi-value{color:#059669}
.db-kpi-blue .db-kpi-icon{background:#dbeafe;color:#2563eb}
.db-kpi-red .db-kpi-icon{background:#fee2e2;color:#dc2626}
.db-kpi-red .db-kpi-value{color:#dc2626}
.db-kpi-orange .db-kpi-icon{background:#fef3c7;color:#d97706}
.db-kpi-purple .db-kpi-icon{background:#ede9fe;color:#7c3aed}
.db-kpi-neutral .db-kpi-icon{background:#f1f5f9;color:#475569}

/* Panel grid */
.db-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.db-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;margin-bottom:24px}
.db-panel{background:#fff;border-radius:14px;border:1px solid #e8ecf1;padding:22px 24px;overflow:hidden}
.db-panel-full{grid-column:1/-1}
.db-panel-title{font-size:15px;font-weight:700;color:#1e1b4b;margin:0 0 16px;display:flex;align-items:center;gap:8px}
.db-panel-title span{font-size:18px}

/* Result chart */
.db-chart-wrap{position:relative;height:200px}
.db-bar-chart{display:flex;align-items:flex-end;gap:6px;height:170px;padding-top:10px}
.db-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.db-bar{border-radius:4px 4px 0 0;width:100%;min-height:2px;transition:height .4s ease}
.db-bar-label{font-size:10px;color:#94a3b8;font-weight:600}
.db-bar-val{font-size:9px;color:#475569;font-weight:600;white-space:nowrap}

/* Progress ring */
.db-ring-wrap{display:flex;align-items:center;gap:24px}
.db-ring-svg{width:100px;height:100px;flex-shrink:0}
.db-ring-info{flex:1}
.db-ring-stat{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f5f6fa;font-size:13px}
.db-ring-stat:last-child{border-bottom:none}
.db-ring-stat span:first-child{color:#64748b}
.db-ring-stat span:last-child{font-weight:700;color:#1e1b4b}

/* Morosos table */
.db-table{width:100%;border-collapse:collapse;font-size:13px}
.db-table thead th{padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;color:#94a3b8;border-bottom:1px solid #e8ecf1;text-align:left}
.db-table tbody td{padding:8px 10px;border-bottom:1px solid #f5f6fa;color:#334155}
.db-table tbody tr:hover{background:#f8faff}
.db-table .r{text-align:right}
.db-table .c{text-align:center}

/* Quick actions */
.db-actions{display:flex;gap:10px;flex-wrap:wrap}
.db-action-btn{display:flex;align-items:center;gap:8px;padding:10px 18px;border:1px solid #e2e8f0;border-radius:10px;background:#fff;cursor:pointer;font-size:13px;font-weight:500;color:#475569;transition:all .15s}
.db-action-btn:hover{border-color:#4f46e5;color:#4f46e5;background:#eef2ff}
.db-action-icon{font-size:18px}

/* Status badges */
.db-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
.db-badge-ok{background:#d1fae5;color:#059669}
.db-badge-warn{background:#fef3c7;color:#d97706}
.db-badge-danger{background:#fee2e2;color:#dc2626}

/* Loading */
.db-loading{display:flex;align-items:center;justify-content:center;gap:12px;padding:80px;color:#94a3b8;font-size:14px}
.db-sp{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#4f46e5;border-radius:50%;animation:dbsp .7s linear infinite}
@keyframes dbsp{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:1200px){.db-kpis{grid-template-columns:repeat(2,1fr)}.db-grid{grid-template-columns:1fr}.db-grid-3{grid-template-columns:1fr}}
@media(max-width:768px){.main-content{margin-left:0;padding:16px}.db-kpis{grid-template-columns:1fr}}
</style>
