<script>
var WEBAPP_URL = '';

(function() {
  // Get URL dynamically
  google.script.run.withSuccessHandler(function(url) {
    WEBAPP_URL = url;
  }).getWebAppUrl();
  
  // Mark active menu
  var urlParams = new URLSearchParams(window.location.search);
  var page = urlParams.get('page') || 'contabilidad';
  var menuItem = document.getElementById('menu-' + page);
  if (menuItem) menuItem.classList.add('active');
  
  // Get user email
  google.script.run.withSuccessHandler(function(email) {
    if (email) {
      document.getElementById('userEmail').textContent = email;
      document.getElementById('userAvatar').textContent = email.charAt(0).toUpperCase();
    }
  }).getUserEmail();
})();

function navigateTo(page) {
  if (WEBAPP_URL) {
    window.top.location.href = WEBAPP_URL + '?page=' + page;
  } else {
    google.script.run.withSuccessHandler(function(url) {
      window.top.location.href = url + '?page=' + page;
    }).getWebAppUrl();
  }
}

// ── CONTROL DE ACCESO ──
var USER_ROLE = null;

function checkUserRole(callback) {
  if (USER_ROLE) { if (callback) callback(USER_ROLE); return; }
  google.script.run.withSuccessHandler(function(r) {
    USER_ROLE = r;
    if (!r.esAdmin) aplicarModoConsulta();
    if (callback) callback(r);
  }).getUserRoleUI();
}

function aplicarModoConsulta() {
  // Ocultar todos los elementos con clase 'admin-only'
  var els = document.querySelectorAll('.admin-only');
  for (var i = 0; i < els.length; i++) els[i].style.display = 'none';
  
  // Deshabilitar botones de acción
  var btns = document.querySelectorAll('[data-admin]');
  for (var i = 0; i < btns.length; i++) {
    btns[i].disabled = true;
    btns[i].title = 'Solo lectura — contacte al administrador';
    btns[i].style.opacity = '0.4';
    btns[i].style.pointerEvents = 'none';
  }
  
  // Mostrar badge de consulta en sidebar
  var footer = document.querySelector('.sidebar-footer .user-meta');
  if (footer) {
    var badge = document.createElement('span');
    badge.style.cssText = 'display:inline-block;font-size:10px;font-weight:600;padding:1px 8px;border-radius:10px;background:#fef3c7;color:#d97706;margin-top:2px';
    badge.textContent = '👁 Solo consulta';
    footer.appendChild(badge);
  }
}

// Auto-check role on every page load
(function() {
  var origLoad = window.onload;
  window.onload = function() {
    if (origLoad) origLoad();
    checkUserRole();
  };
  // Also check immediately if DOM ready
  if (document.readyState === 'complete' || document.readyState === 'interactive') {
    checkUserRole();
  }
})();
</script>
