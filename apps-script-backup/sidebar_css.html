<style>
/* ============================================
   SIDEBAR — Notifica Legal ERP
   Brand: #1e1b8a (deep indigo)
   ============================================ */
:root {
  --sb-bg: #1e1b8a;
  --sb-bg-hover: rgba(255,255,255,.08);
  --sb-bg-active: rgba(255,255,255,.14);
  --sb-text: rgba(255,255,255,.72);
  --sb-text-active: #fff;
  --sb-accent: #60a5fa;
  --sb-border: rgba(255,255,255,.08);
  --sb-w: 240px;
}

/* ── Base ── */
.sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: var(--sb-w);
  background: var(--sb-bg);
  display: flex; flex-direction: column;
  z-index: 200;
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  overflow: hidden;
}

/* ── Header / Logo ── */
.sidebar-header {
  padding: 20px 18px 16px;
  border-bottom: 1px solid var(--sb-border);
}
.logo {
  display: flex; align-items: center; gap: 12px;
}
.logo-mark {
  width: 36px; height: 36px;
  background: rgba(255,255,255,.15);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 800; color: #fff;
  letter-spacing: -.5px;
}
.logo-info {
  display: flex; flex-direction: column; gap: 1px;
}
.logo-text {
  font-size: 15px; font-weight: 700; color: #fff;
  letter-spacing: -.2px;
}
.logo-subtitle {
  font-size: 10px; color: rgba(255,255,255,.42);
  text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500;
}

/* ── Menu ── */
.sidebar-menu {
  flex: 1; overflow-y: auto; padding: 12px 0;
}
.menu-section {
  margin-bottom: 8px;
}
.menu-section-title {
  display: block;
  padding: 10px 18px 6px;
  font-size: 10px; font-weight: 700;
  color: rgba(255,255,255,.35);
  text-transform: uppercase; letter-spacing: 1.2px;
}
.menu-item {
  display: flex; align-items: center; gap: 11px;
  padding: 9px 18px;
  margin: 1px 8px;
  border-radius: 8px;
  color: var(--sb-text);
  text-decoration: none;
  font-size: 13.5px; font-weight: 500;
  transition: all .15s ease;
  cursor: pointer;
}
.menu-item:hover {
  background: var(--sb-bg-hover);
  color: var(--sb-text-active);
}
.menu-item.active {
  background: var(--sb-bg-active);
  color: var(--sb-text-active);
}
.menu-item.active .mi {
  color: var(--sb-accent);
}
.mi {
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  color: rgba(255,255,255,.5);
  transition: color .15s;
}
.menu-item:hover .mi { color: rgba(255,255,255,.8); }
.mt { white-space: nowrap; }

/* ── Footer ── */
.sidebar-footer {
  padding: 14px 18px;
  border-top: 1px solid var(--sb-border);
}
.user-info {
  display: flex; align-items: center; gap: 10px;
}
.user-avatar {
  width: 30px; height: 30px;
  background: rgba(255,255,255,.12);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: rgba(255,255,255,.7);
  flex-shrink: 0;
}
.user-meta { min-width: 0; }
.user-email {
  font-size: 11.5px; color: rgba(255,255,255,.5);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: block; max-width: 160px;
}

/* ── Mobile toggle ── */
.sidebar-toggle {
  display: none;
  position: fixed; top: 12px; left: 12px;
  z-index: 300;
  width: 38px; height: 38px;
  background: var(--sb-bg); color: #fff;
  border: none; border-radius: 8px;
  align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,.2);
}

/* ── Responsive ── */
@media (max-width: 1024px) {
  .sidebar {
    transform: translateX(-100%);
    transition: transform .25s ease;
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: 4px 0 24px rgba(0,0,0,.3);
  }
  .sidebar-toggle { display: flex; }
  .main-content { margin-left: 0 !important; }
}

@media print {
  .sidebar, .sidebar-toggle { display: none; }
}

/* ── Scrollbar ── */
.sidebar-menu::-webkit-scrollbar { width: 3px; }
.sidebar-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
</style>
